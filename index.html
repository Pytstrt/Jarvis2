<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Real Voice Edition</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #arc-reactor { 
            width: 180px; height: 180px; border-radius: 50%; border: 4px solid #00e5ff; 
            box-shadow: 0 0 50px #00e5ff, inset 0 0 20px #00e5ff; 
            cursor: pointer; animation: glow 1.5s infinite ease-in-out; 
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-weight: bold; font-family: 'Orbitron', sans-serif;
        }
        @keyframes glow { 0% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.6; transform: scale(1); } }
        #status { margin-top: 30px; letter-spacing: 2px; color: #00e5ff; font-size: 14px; }
        #response { margin-top: 15px; width: 80%; text-align: center; color: #fff; font-size: 18px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="arc-reactor" onclick="startJarvis()">JARVIS<br>ACTIVE</div>
    <div id="status">SYSTEM ONLINE</div>
    <div id="response">Waiting for command...</div>

    <script>
        const statusDiv = document.getElementById('status');
        const responseDiv = document.getElementById('response');

        // --- REAL JARVIS VOICE ENGINE ---
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // Sabse best male voice dhoondhna
            let selectedVoice = voices.find(v => v.name.includes('Google US English Male')) || 
                                voices.find(v => v.name.includes('Microsoft David')) ||
                                voices.find(v => v.name.includes('Male')) ||
                                voices[0];

            utterance.voice = selectedVoice;
            
            // Voice Settings for "Real Jarvis" feel
            utterance.pitch = 0.75; // Bahut deep aur bhari awaaz ke liye
            utterance.rate = 0.95;  // Thoda slowly aur professional bolne ke liye
            utterance.volume = 1;

            window.speechSynthesis.speak(utterance);
        }

        // Voice list ko pre-load karna (Chrome ke liye zaroori hai)
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        function startJarvis() {
            const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            const rec = new SpeechRecognition();
            rec.lang = 'en-US';

            rec.onstart = () => { 
                statusDiv.innerText = "LISTENING..."; 
                statusDiv.style.color = "red";
            };

            rec.onresult = async (event) => {
                let query = event.results[0][0].transcript.toLowerCase();
                statusDiv.innerText = "PROCESSING...";
                statusDiv.style.color = "#00e5ff";

                // Play/Open commands
                if (query.includes("play")) {
                    let song = query.replace("play", "").trim();
                    speak("Playing " + song + " now.");
                    window.open(`https://www.youtube.com/results?search_query=${song}`, "_blank");
                    return;
                }
                if (query.includes("open")) {
                    let site = query.replace("open", "").trim();
                    speak("Accessing " + site);
                    window.open(`https://www.${site}.com`, "_blank");
                    return;
                }

                // AI Response
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: query })
                });
                const data = await res.json();
                responseDiv.innerText = data.response;
                speak(data.response);
            };

            rec.onend = () => { statusDiv.innerText = "SYSTEM ONLINE"; };
            rec.start();
        }
    </script>
</body>
</html>
