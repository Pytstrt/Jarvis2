<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - TEJAS MUNJAL</title>
    <style>
        /* BASE & THEME */
        body, html {
            background: #000; color: #00e5ff;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
            perspective: 1200px;
        }

        /* --- 1. INTRO ANIMATION (ALG WALA) --- */
        #intro-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 1;
            transition: opacity 1s ease-out; /* Jab gayab ho toh smooth ho */
            z-index: 10; /* Sabse upar */
        }
        #intro-text { font-size: 18px; letter-spacing: 5px; color: #fff; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        #intro-line { width: 0%; height: 2px; background: #00e5ff; margin-top: 15px; animation: load 2.5s forwards; }
        @keyframes load { 100% { width: 80%; } }

        /* --- 2. MAIN 3D UI (Starts hidden) --- */
        #main-ui {
            display: none; /* Pehle band rahega */
            flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1.5s ease-in;
        }
        #main-ui.show { display: flex; opacity: 1; }

        /* 3D Container */
        #arc-container {
            width: 250px; height: 250px; position: relative; cursor: pointer; transition: 0.5s;
        }

        /* 3D Rotating Sphere */
        #arc-reactor {
            width: 100%; height: 100%; border-radius: 50%; position: absolute; top: 0; left: 0;
            background: radial-gradient(circle, rgba(0,229,255,0.05) 0%, rgba(0,0,0,1) 80%);
            border: 2px solid #00e5ff;
            box-shadow: 0 0 50px #00e5ff, inset 0 0 30px rgba(0,229,255,0.5);
            transform-style: preserve-3d;
            animation: rotate3D 6s infinite linear;
        }

        /* Text Overlay (Tejas Munjal - No Collapse) */
        #reactor-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); /* Fixed in Center */
            text-align: center; width: 100%; color: #fff;
            font-weight: bold; font-size: 16px; letter-spacing: 1px;
            pointer-events: none; text-shadow: 0 0 10px #00e5ff;
        }

        /* Internal Rings for 3D depth */
        #arc-reactor::before, #arc-reactor::after {
            content: ''; position: absolute; border-radius: 50%; border: 1px solid rgba(0,229,255,0.3);
            top: 10%; left: 10%; width: 80%; height: 80%; transform: translateZ(25px);
        }
        #arc-reactor::after { top: 20%; left: 20%; width: 60%; height: 60%; transform: translateZ(-25px); }

        /* Normal Rotation */
        @keyframes rotate3D { 0% { transform: rotateY(0deg) rotateX(10deg); } 100% { transform: rotateY(360deg) rotateX(10deg); } }

        /* Listening Pulse (Red) */
        .active #arc-reactor {
            animation: rotate3D 1s infinite linear;
            border-color: #ff0000;
            box-shadow: 0 0 70px #ff0000, inset 0 0 40px rgba(255,0,0,0.5);
        }

        /* Info Display */
        #status { margin-top: 30px; letter-spacing: 2px; font-size: 11px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
        #output { margin-top: 15px; width: 85%; text-align: center; color: white; white-space: pre-wrap; font-size: 14px; max-height: 30vh; overflow: auto; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="intro-screen">
        <div id="intro-text">STARK INDUSTRIES SYSTEMS</div>
        <div id="intro-line"></div>
    </div>

    <div id="main-ui">
        <div id="arc-container" onclick="toggleMic()">
            <div id="arc-reactor"></div>
            <div id="reactor-text">JARVIS BY<br>TEJAS MUNJAL</div>
        </div>
        <div id="status">INITIALIZING SYSTEMS</div>
        <div id="output"></div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const container = document.getElementById('arc-container');
        const outputDiv = document.getElementById('output');
        const intro = document.getElementById('intro-screen');
        const mainUI = document.getElementById('main-ui');
        let recognition;
        let isActive = false;

        // --- GLOBAL MALE VOICE ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            let maleVoice = voices.find(v => v.name.toLowerCase().includes('male')) || voices.find(v => v.name.includes('David')) || voices.find(v => v.lang.includes('en-US'));
            if (maleVoice) utterance.voice = maleVoice;
            utterance.pitch = 0.75;
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // --- PAGE LOAD LOGIC (Sequencing) ---
        window.addEventListener('load', () => {
            // Wait for intro animation to finish
            setTimeout(() => {
                intro.style.opacity = '0'; // Gayab karo intro
                setTimeout(() => {
                    intro.style.display = 'none'; // Memory se hatao
                    mainUI.classList.add('show'); // 3D wala main UI dikhao
                    
                    // First time initialization (voices loading)
                    speak(""); // Pre-load synthesis
                    startSystem(); // Automatically start listening
                    statusDiv.innerText = "Systems online. Say 'Hey Jarvis'";
                    speak("I am back, Tejas Munjal. Systems fully operational.");
                }, 1000); // Intro fade out ke baad
            }, 3000); // Intro length (3 seconds)
        });

        function startSystem() {
            const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.lang = 'en-US';

            recognition.onresult = async (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();

                if (transcript.includes("hey jarvis") || transcript.includes("hello jarvis")) {
                    window.speechSynthesis.cancel();
                    isActive = true;
                    container.classList.add('active'); // Pulse red
                    statusDiv.innerText = "LISTENING...";
                    speak("Yes");
                    return;
                }

                if (isActive) {
                    if (transcript.includes("play")) {
                        let song = transcript.replace("play", "").trim();
                        speak("Playing " + song);
                        window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(song)}`, "player", "width=800,height=600");
                    } 
                    else if (transcript.includes("open")) {
                        let site = transcript.replace("open", "").trim();
                        speak("Opening " + site);
                        window.open(`https://www.${site.replace(/\s/g, '')}.com`, "_blank");
                    }
                    else {
                        // AI Chat
                        const res = await fetch('/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: transcript })
                        });
                        const data = await res.json();
                        outputDiv.innerText = data.response;
                        speak(data.response);
                    }
                    isActive = false;
                    container.classList.remove('active');
                    statusDiv.innerText = "SAY 'HEY JARVIS'";
                }
            };

            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }

        function toggleMic() { speak("Tap successful. Systems active."); }
    </script>
</body>
</html>
