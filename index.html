<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - TEJAS MUNJAL</title>
    <style>
        :root { --neon: #00e5ff; --blue: #0072ff; --white: #ffffff; }
        body, html {
            background: #000; margin: 0; padding: 0;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif;
        }

        #master-container {
            position: relative; width: 550px; height: 550px;
            display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d; perspective: 1500px;
        }

        .ring {
            position: absolute; border-radius: 60px 0 0 60px;
            border: 4px solid var(--neon); box-shadow: 0 0 25px var(--neon);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* FIXED TEXT CLARITY & SIZE */
        #status {
            position: absolute; 
            font-size: 14px; /* Reduced Size for Premium Look */
            font-weight: 900; 
            letter-spacing: 4px; /* Balanced Spacing */
            color: var(--white); 
            text-align: center; 
            z-index: 1000;
            text-shadow: 0 0 10px rgba(0,0,0,1), 0 0 5px var(--neon);
            pointer-events: none; 
            transition: all 0.8s;
            line-height: 1.8;
            opacity: 0;
        }

        .arc-part {
            position: absolute; border-radius: 50%; opacity: 0; transform: scale(0);
            transition: all 1s ease;
        }

        #heart { 
            width: 35%; height: 35%; border: none;
            background: radial-gradient(circle, #fff 5%, var(--neon) 40%, transparent 75%);
            box-shadow: 0 0 70px var(--neon);
        }

        /* ANIMATIONS */
        @keyframes spinZ { from { transform: rotateX(55deg) rotateZ(0deg); } to { transform: rotateX(55deg) rotateZ(360deg); } }
        @keyframes spinRev { from { transform: rotateX(55deg) rotateZ(360deg); } to { transform: rotateX(55deg) rotateZ(0deg); } }
        @keyframes heartPulse { 0%, 100% { transform: translateZ(10px) scale(1); opacity: 0.7; } 50% { transform: translateZ(30px) scale(1.1); opacity: 1; } }
        @keyframes simpleSpin { to { transform: rotate(360deg); } }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="master-container">
        <div id="r1" class="ring" style="width: 100%; height: 140px; border-right: none; transform: translateX(-50px);"></div>
        <div id="r2" class="ring" style="width: 100%; height: 140px; border-left: none; border-radius: 0 60px 60px 0; border-color: var(--blue); transform: translateX(50px);"></div>
        
        <div id="heart" class="arc-part"></div>
        <div id="status"></div>
    </div>

    <script>
        const r1 = document.getElementById('r1');
        const r2 = document.getElementById('r2');
        const txt = document.getElementById('status');
        const heart = document.getElementById('heart');

        window.onload = () => {
            setTimeout(() => {
                let name = "TEJAS MUNJAL";
                let i = 0;
                let t = setInterval(() => {
                    txt.style.opacity = "1";
                    txt.innerHTML += name[i]; i++;
                    if(i >= name.length) { clearInterval(t); setTimeout(morphToBoot, 2000); }
                }, 120);
            }, 500);
        };

        function morphToBoot() {
            txt.style.opacity = '0';
            setTimeout(() => {
                r1.style.width = "400px"; r1.style.height = "400px";
                r1.style.borderRadius = "50%"; r1.style.borderRight = "5px solid var(--neon)";
                r1.style.transform = "translateX(0)";

                r2.style.width = "400px"; r2.style.height = "400px";
                r2.style.borderRadius = "50%"; r2.style.borderLeft = "5px solid var(--blue)";
                r2.style.transform = "translateX(0)";
                r2.style.animation = "simpleSpin 2s linear infinite";

                setTimeout(() => {
                    txt.innerHTML = "0%"; txt.style.fontSize = "3rem"; txt.style.opacity = "1";
                }, 500);
                
                let p = 0;
                let load = setInterval(() => {
                    p++; if(txt.innerHTML.includes("%")) txt.innerHTML = p + "%";
                    if(p >= 100) { clearInterval(load); setTimeout(morphToFinal, 800); }
                }, 50);
            }, 600);
        }

        function morphToFinal() {
            txt.style.opacity = '0';
            r2.style.animation = "none";

            setTimeout(() => {
                r1.style.width = "480px"; r1.style.height = "480px";
                r1.style.border = "16px double var(--blue)";
                r1.style.animation = "spinZ 15s linear infinite";

                r2.style.width = "340px"; r2.style.height = "340px";
                r2.style.border = "2px dashed var(--neon)";
                r2.style.animation = "spinRev 8s linear infinite";

                heart.style.opacity = "1";
                heart.style.transform = "scale(1)";
                heart.style.animation = "heartPulse 3s infinite ease-in-out";

                setTimeout(() => {
                    // Final Branding Adjustments
                    txt.innerHTML = "JARVIS BY<br>TEJAS MUNJAL";
                    txt.style.fontSize = "13px"; // Small & Sleek
                    txt.style.letterSpacing = "6px";
                    txt.style.opacity = "1";
                    // Pushed slightly lower and much further in front for perfect depth
                    txt.style.transform = "translateZ(250px) translateY(10px)";
                }, 1000);
            }, 500);
        }
    </script>
</body>
</html>
