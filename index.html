<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #arc-reactor { width: 180px; height: 180px; border-radius: 50%; border: 5px solid #00e5ff; box-shadow: 0 0 50px #00e5ff; cursor: pointer; animation: pulse 2s infinite; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.8rem; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #status { margin-top: 25px; font-weight: bold; text-transform: uppercase; }
        #response { margin-top: 10px; width: 85%; text-align: center; color: #fff; }
    </style>
</head>
<body>

    <div id="arc-reactor" onclick="startJarvis()">JARVIS<br>BY TEJAS</div>
    <div id="status">Ready for orders.</div>
    <div id="response"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const responseDiv = document.getElementById('response');

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const maleVoice = voices.find(v => v.name.includes('Male') || v.name.includes('David'));
            if (maleVoice) utterance.voice = maleVoice;
            utterance.pitch = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function startJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-IN';

            recognition.onstart = () => { statusDiv.innerText = "Listening..."; };

            recognition.onresult = async (event) => {
                let query = event.results[0][0].transcript.toLowerCase();
                statusDiv.innerText = "Executing...";

                // Automation with no 'Sir'
                if (query.includes("play")) {
                    let song = query.replace("play", "").trim();
                    speak("Playing " + song);
                    window.open(`https://www.youtube.com/results?search_query=${song}`, "_blank");
                    return;
                }

                if (query.includes("open")) {
                    let site = query.replace("open", "").trim();
                    speak("Opening " + site);
                    window.open(`https://www.${site}.com`, "_blank");
                    return;
                }

                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: query })
                });
                const data = await res.json();
                responseDiv.innerText = data.response;
                speak(data.response);
            };

            recognition.onend = () => { statusDiv.innerText = "System Idle."; };
            recognition.start();
        }
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
