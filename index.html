<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - TEJAS MUNJAL</title>
    <style>
        :root { --neon: #00e5ff; --blue: #0072ff; --white: #ffffff; --active: #ff3d00; }
        body, html {
            background: #000; margin: 0; padding: 0;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif;
        }

        #master-container {
            position: relative; width: 500px; height: 500px;
            display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d; perspective: 1500px;
        }

        .ring {
            position: absolute; border-radius: 60px 0 0 60px;
            border: 4px solid var(--neon); box-shadow: 0 0 25px var(--neon);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #status {
            position: absolute; font-size: 13px; font-weight: 900; letter-spacing: 6px;
            color: var(--white); text-align: center; z-index: 1000;
            text-shadow: 0 0 10px rgba(0,0,0,1), 0 0 5px var(--neon);
            pointer-events: none; line-height: 1.8;
        }

        #start-btn {
            position: fixed; z-index: 2000; padding: 15px 30px;
            background: transparent; border: 2px solid var(--neon);
            color: var(--neon); font-family: 'Orbitron'; cursor: pointer;
            box-shadow: 0 0 15px var(--neon); text-transform: uppercase;
        }

        #speech-box {
            position: fixed; bottom: 30px; width: 80%; max-width: 600px;
            padding: 15px; border: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(0, 0, 0, 0.8); color: var(--neon);
            border-radius: 10px; text-align: center; font-size: 11px;
            letter-spacing: 2px;
        }

        .arc-part { position: absolute; border-radius: 50%; opacity: 0; transform: scale(0); transition: all 0.5s ease; }
        #heart { 
            width: 35%; height: 35%; border: none; 
            background: radial-gradient(circle, #fff 5%, var(--neon) 40%, transparent 75%); 
            box-shadow: 0 0 70px var(--neon); 
        }

        @keyframes spinZ { from { transform: rotateX(55deg) rotateZ(0deg); } to { transform: rotateX(55deg) rotateZ(360deg); } }
        @keyframes spinRev { from { transform: rotateX(55deg) rotateZ(360deg); } to { transform: rotateX(55deg) rotateZ(0deg); } }
        @keyframes heartPulse { 0%, 100% { transform: translateZ(10px) scale(1); opacity: 0.7; } 50% { transform: translateZ(30px) scale(1.1); opacity: 1; } }
        @keyframes simpleSpin { to { transform: rotate(360deg); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <button id="start-btn">Power On Systems</button>

    <div id="master-container">
        <div id="r1" class="ring" style="width: 100%; height: 140px; border-right: none; transform: translateX(-50px);"></div>
        <div id="r2" class="ring" style="width: 100%; height: 140px; border-left: none; border-radius: 0 60px 60px 0; border-color: var(--blue); transform: translateX(50px);"></div>
        <div id="heart" class="arc-part"></div>
        <div id="status"></div>
    </div>

    <div id="speech-box">SYSTEM IDLE...</div>

    <script>
        const r1 = document.getElementById('r1');
        const r2 = document.getElementById('r2');
        const txt = document.getElementById('status');
        const heart = document.getElementById('heart');
        const speechBox = document.getElementById('speech-box');
        const startBtn = document.getElementById('start-btn');

        let isJarvisActive = false;

        window.onload = () => {
            let name = "TEJAS MUNJAL";
            let i = 0;
            let t = setInterval(() => {
                txt.innerHTML += name[i]; i++;
                if(i >= name.length) { clearInterval(t); morphToBoot(); }
            }, 100);
        };

        function morphToBoot() {
            txt.style.opacity = '0';
            setTimeout(() => {
                r1.style.width = "400px"; r1.style.height = "400px"; r1.style.borderRadius = "50%"; r1.style.transform = "translateX(0)";
                r2.style.width = "400px"; r2.style.height = "400px"; r2.style.borderRadius = "50%"; r2.style.transform = "translateX(0)";
                r2.style.animation = "simpleSpin 2s linear infinite";
                txt.innerHTML = "LOADING..."; txt.style.opacity = "1";
                setTimeout(morphToFinal, 2000);
            }, 500);
        }

        function morphToFinal() {
            txt.style.opacity = '0';
            r2.style.animation = "none";
            setTimeout(() => {
                r1.style.width = "480px"; r1.style.height = "480px"; r1.style.border = "16px double var(--blue)";
                r1.style.animation = "spinZ 15s linear infinite";
                r2.style.width = "340px"; r2.style.height = "340px"; r2.style.border = "2px dashed var(--neon)";
                r2.style.animation = "spinRev 8s linear infinite";
                heart.style.opacity = "1"; heart.style.animation = "heartPulse 3s infinite ease-in-out";
                setTimeout(() => {
                    txt.innerHTML = "JARVIS BY<br>TEJAS MUNJAL";
                    txt.style.opacity = "1"; txt.style.transform = "translateZ(250px) translateY(10px)";
                }, 800);
            }, 500);
        }

        let recognition;
        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = true;

            recognition.onstart = () => { speechBox.innerHTML = "SAY 'HEY JARVIS' TO ACTIVATE"; };
            
            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                speechBox.innerHTML = "HEARD: " + transcript;

                // WAKE WORD LOGIC
                if (transcript.includes("hey jarvis") || transcript.includes("hi jarvis") || transcript.includes("okay jarvis")) {
                    activateJarvis();
                    return;
                }

                if (isJarvisActive) {
                    if (transcript.includes("who are you")) {
                        speak("I am Jarvis, your personal assistant made by Tejas Munjal.");
                    } 
                    else if (transcript.includes("who is tejas") || transcript.includes("who made you") || transcript.includes("who has made you")) {
                        speak("I am made by Tejas Munjal. He gave me life through his knowledge of coding.");
                    }
                    else {
                        speak("Command received, but I don't have instructions for that yet.");
                    }
                    deactivateJarvis();
                }
            };

            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }

        function activateJarvis() {
            isJarvisActive = true;
            heart.style.background = "radial-gradient(circle, #fff 5%, var(--active) 40%, transparent 75%)";
            heart.style.boxShadow = "0 0 70px var(--active)";
            speak("Yes, Tejas Sir? I am listening.");
        }

        function deactivateJarvis() {
            setTimeout(() => {
                isJarvisActive = false;
                heart.style.background = "radial-gradient(circle, #fff 5%, var(--neon) 40%, transparent 75%)";
                heart.style.boxShadow = "0 0 70px var(--neon)";
            }, 5000);
        }

        startBtn.onclick = () => {
            startBtn.style.display = "none";
            initSpeech();
            speak("Systems Online.");
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.0;
            utter.pitch = 0.8;
            window.speechSynthesis.speak(utter);
        }
    </script>
</body>
</html>
