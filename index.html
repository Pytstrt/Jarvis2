<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - TEJAS MUNJAL</title>
    <style>
        body, html {
            background: #000; color: #00e5ff;
            font-family: 'Orbitron', sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            perspective: 1500px;
        }

        /* --- STAGE 1: 3D TITLE ANIMATION --- */
        #stage1-title {
            position: absolute; text-align: center;
            animation: titleEntry 3s forwards;
            z-index: 10;
        }
        @keyframes titleEntry {
            0% { opacity: 0; transform: translateZ(-500px) rotateX(90deg); }
            50% { opacity: 1; transform: translateZ(0) rotateX(0deg); }
            100% { opacity: 0; transform: translateZ(200px); display: none; }
        }
        .glow-text { font-size: 2.5rem; text-shadow: 0 0 20px #00e5ff; letter-spacing: 5px; }

        /* --- STAGE 2: 3D LOADING (As per your photo) --- */
        #stage2-loading {
            display: none; position: absolute; flex-direction: column; align-items: center;
        }
        .loader-ring {
            width: 250px; height: 250px; border-radius: 50%;
            border: 2px solid transparent; border-top: 4px solid #00e5ff;
            border-bottom: 4px solid #00e5ff;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px #00e5ff;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #percent { font-size: 3rem; margin-top: -160px; font-weight: bold; z-index: 5; }

        /* --- STAGE 3: FINAL 3D ARC REACTOR --- */
        #stage3-main {
            display: none; flex-direction: column; align-items: center;
            opacity: 0; transition: opacity 1.5s ease-in;
        }
        .arc-container { width: 300px; height: 300px; position: relative; cursor: pointer; }
        .sphere {
            width: 100%; height: 100%; border-radius: 50%;
            border: 3px solid #00e5ff;
            box-shadow: 0 0 60px #00e5ff, inset 0 0 40px rgba(0,229,255,0.4);
            transform-style: preserve-3d;
            animation: sphereRotate 10s infinite linear;
        }
        @keyframes sphereRotate { 0% { transform: rotateY(0deg) rotateX(15deg); } 100% { transform: rotateY(360deg) rotateX(15deg); } }
        
        .inner-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #fff; font-size: 14px; font-weight: bold;
            text-shadow: 0 0 10px #00e5ff; pointer-events: none;
        }

        .active .sphere { border-color: #ff0000; box-shadow: 0 0 80px #ff0000; animation-duration: 1.5s; }

        #status { margin-top: 40px; font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.6); }
        #output { margin-top: 20px; width: 80%; text-align: center; font-size: 14px; color: #fff; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="stage1-title">
        <div class="glow-text">JARVIS BY<br>TEJAS MUNJAL</div>
    </div>

    <div id="stage2-loading">
        <div class="loader-ring"></div>
        <div id="percent">0%</div>
        <div style="margin-top: 140px; letter-spacing: 5px;">ESTABLISHING UPLINK</div>
    </div>

    <div id="stage3-main">
        <div class="arc-container" id="reactor-trigger" onclick="toggleMic()">
            <div class="sphere"></div>
            <div class="inner-text">JARVIS BY<br>TEJAS MUNJAL</div>
        </div>
        <div id="status">SYSTEMS ONLINE</div>
        <div id="output"></div>
    </div>

    <script>
        const s1 = document.getElementById('stage1-title');
        const s2 = document.getElementById('stage2-loading');
        const s3 = document.getElementById('stage3-main');
        const pct = document.getElementById('percent');
        const output = document.getElementById('output');
        const reactor = document.getElementById('reactor-trigger');

        let recognition;
        let isActive = false;

        // --- SEQUENCE CONTROLLER ---
        window.addEventListener('load', () => {
            // Stage 1 for 3 seconds
            setTimeout(() => {
                s1.style.display = 'none';
                s2.style.display = 'flex';
                startLoading();
            }, 3000);
        });

        function startLoading() {
            let p = 0;
            let interval = setInterval(() => {
                p++;
                pct.innerText = p + "%";
                if (p >= 100) {
                    clearInterval(interval);
                    setTimeout(showMainUI, 800);
                }
            }, 40);
        }

        function showMainUI() {
            s2.style.opacity = '0';
            setTimeout(() => {
                s2.style.display = 'none';
                s3.style.display = 'flex';
                setTimeout(() => s3.style.opacity = '1', 100);
                speak("Connection established. Welcome back, Tejas Munjal.");
                startJarvis();
            }, 500);
        }

        // --- CORE ENGINE ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            u.voice = voices.find(v => v.name.includes('Male')) || voices[0];
            u.pitch = 0.8;
            window.speechSynthesis.speak(u);
        }

        function startJarvis() {
            const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
            recognition = new SR();
            recognition.continuous = true;
            recognition.lang = 'en-US';

            recognition.onresult = async (e) => {
                const talk = e.results[e.results.length - 1][0].transcript.toLowerCase();
                if (talk.includes("hey jarvis")) {
                    window.speechSynthesis.cancel();
                    isActive = true;
                    reactor.classList.add('active');
                    speak("Go ahead");
                    return;
                }
                if (isActive) {
                    const res = await fetch('/chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({message: talk})
                    });
                    const d = await res.json();
                    output.innerText = d.response;
                    speak(d.response);
                    isActive = false;
                    reactor.classList.remove('active');
                }
            };
            recognition.onend = () => recognition.start();
            recognition.start();
        }

        function toggleMic() { speak("Voice override active."); }
    </script>
</body>
</html>
