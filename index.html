<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - TEJAS MUNJAL</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #arc-reactor { 
            width: 180px; height: 180px; border-radius: 50%; border: 4px solid #00e5ff; 
            box-shadow: 0 0 40px #00e5ff; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; font-size: 14px;
        }
        .active { border-color: #ff0000 !important; box-shadow: 0 0 60px #ff0000 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { margin-top: 25px; letter-spacing: 2px; font-size: 13px; text-transform: uppercase; }
        #output { margin-top: 15px; width: 85%; text-align: center; color: white; white-space: pre-wrap; overflow-y: auto; max-height: 40vh; }
    </style>
</head>
<body>

    <div id="arc-reactor" onclick="toggleMic()">JARVIS BY<br>TEJAS MUNJAL</div>
    <div id="status">CLICK TO START</div>
    <div id="output"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const reactor = document.getElementById('arc-reactor');
        const outputDiv = document.getElementById('output');
        let recognition;
        let isActive = false;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            let maleVoice = voices.find(v => v.name.toLowerCase().includes('male')) || voices.find(v => v.name.includes('David')) || voices.find(v => v.lang.includes('en-US'));
            if (maleVoice) utterance.voice = maleVoice;
            utterance.pitch = 0.75;
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function toggleMic() {
            if (!recognition) {
                startSystem();
                statusDiv.innerText = "SAY 'HEY JARVIS'";
                speak("Systems fully operational. Ready for orders.");
            }
        }

        function startSystem() {
            const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.lang = 'en-US';

            recognition.onresult = async (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();

                // STOP SPEAKING IF 'HEY JARVIS' IS HEARD
                if (transcript.includes("hey jarvis") || transcript.includes("hello jarvis")) {
                    window.speechSynthesis.cancel(); // Turant chup ho jayega
                    isActive = true;
                    reactor.classList.add('active');
                    statusDiv.innerText = "LISTENING...";
                    speak("Listening.");
                    return;
                }

                if (isActive) {
                    if (transcript.includes("play")) {
                        let song = transcript.replace("play", "").trim();
                        speak("Playing " + song);
                        window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(song)}`, "player");
                    } 
                    else if (transcript.includes("open")) {
                        let site = transcript.replace("open", "").trim();
                        speak("Accessing " + site);
                        window.open(`https://www.${site.replace(/\s/g, '')}.com`, "_blank");
                    }
                    else {
                        const res = await fetch('/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: transcript })
                        });
                        const data = await res.json();
                        outputDiv.innerText = data.response;
                        speak(data.response);
                    }
                    isActive = false;
                    reactor.classList.remove('active');
                    statusDiv.innerText = "SAY 'HEY JARVIS'";
                }
            };

            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }
    </script>
</body>
</html>
