<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Cloud Edition</title>
    <style>
        /* Modern Dark UI */
        body {
            background-color: #000;
            color: #00e5ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Arc Reactor Animation */
        #arc-reactor {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #00e5ff;
            box-shadow: 0 0 50px #00e5ff, inset 0 0 50px #00e5ff;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        #status {
            margin-top: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #chat-box {
            margin-top: 20px;
            width: 80%;
            max-width: 600px;
            background: rgba(0, 229, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00e5ff;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="arc-reactor" onclick="startJarvis()">
        <span id="inner-circle" style="font-size: 0.8rem;">TAP TO START</span>
    </div>

    <div id="status">Online & Ready, Sir.</div>
    <div id="chat-box" id="response-text">Waiting for command...</div>

    <script>
        const statusText = document.getElementById('status');
        const responseBox = document.getElementById('chat-box');

        // JARVIS KI AWAAZ (Speaker)
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // JARVIS KA KAAN (Microphone)
        function startJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                statusText.innerText = "Listening...";
                statusText.style.color = "red";
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                responseBox.innerText = "You: " + transcript;
                
                // Server (Python) ko message bhejna
                statusText.innerText = "Processing...";
                statusText.style.color = "#00e5ff";

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: transcript })
                    });
                    const data = await response.json();
                    
                    // Jarvis ka Jawab Dikhao aur Bolo
                    responseBox.innerText = "Jarvis: " + data.response;
                    speak(data.response);
                } catch (error) {
                    console.error("Error:", error);
                    responseBox.innerText = "Error connecting to server.";
                }
            };

            recognition.onend = () => {
                statusText.innerText = "Online & Ready, Sir.";
                statusText.style.color = "#00e5ff";
            };

            recognition.start();
        }
    </script>
</body>
</html>
