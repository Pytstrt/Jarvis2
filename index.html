<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Always Listening</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #arc-reactor { 
            width: 150px; height: 150px; border-radius: 50%; border: 3px solid #00e5ff; 
            box-shadow: 0 0 30px #00e5ff; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .active { animation: pulse 1s infinite; border-color: red !important; box-shadow: 0 0 50px red !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="arc-reactor" onclick="toggleActivation()">SYSTEM<br>READY</div>
    <div id="status">SAY 'HEY JARVIS' TO ACTIVATE</div>
    <div id="response" style="margin-top:20px; width:80%; text-align:center;"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const reactor = document.getElementById('arc-reactor');
        let isJarvisActive = false;
        let recognition;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            let maleVoice = voices.find(v => v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google US English'));
            if (maleVoice) utterance.voice = maleVoice;
            utterance.pitch = 0.8;
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function initRecognition() {
            const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true; // Ye mic ko band nahi hone dega
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = async (event) => {
                const last = event.results.length - 1;
                const command = event.results[last][0].transcript.toLowerCase().trim();
                
                console.log("Heard:", command);

                // Wake Word Detection
                if (command.includes("hey jarvis") || command.includes("hello jarvis")) {
                    isJarvisActive = true;
                    reactor.classList.add('active');
                    statusDiv.innerText = "YES, I AM LISTENING...";
                    speak("At your service.");
                    return;
                }

                if (isJarvisActive) {
                    statusDiv.innerText = "PROCESSING...";
                    
                    // Automation Commands
                    if (command.includes("play")) {
                        let song = command.replace("play", "").trim();
                        speak("Playing " + song);
                        window.open(`https://www.youtube.com/results?search_query=${song}`, "_blank");
                    } else if (command.includes("open")) {
                        let site = command.replace("open", "").trim();
                        speak("Opening " + site);
                        window.open(`https://www.${site}.com`, "_blank");
                    } else {
                        // AI Response
                        const res = await fetch('/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: command })
                        });
                        const data = await res.json();
                        document.getElementById('response').innerText = data.response;
                        speak(data.response);
                    }
                    
                    // Respond hone ke baad wapas sleep mode mein ja sakta hai ya listening reh sakta hai
                    isJarvisActive = false; 
                    reactor.classList.remove('active');
                    statusDiv.innerText = "SAY 'HEY JARVIS'";
                }
            };

            recognition.onend = () => {
                recognition.start(); // Agar mic band ho jaye, toh automatically restart kar do
            };

            recognition.start();
        }

        function toggleActivation() {
            if (!recognition) {
                initRecognition();
                statusDiv.innerText = "WAKE WORD ACTIVE";
            }
        }
    </script>
</body>
</html>
